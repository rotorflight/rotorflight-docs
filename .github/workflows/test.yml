name: Staging Deploy to GitHub Pages

on:
  push:
    branches:
      - test
      - "test/**"
    # Review gh actions docs if you want to further define triggers, paths, etc
    # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#on

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    env:
      ALGOLIA_APP_ID: ${{ vars.ALGOLIA_APP_ID }}
      ALGOLIA_SEARCH_API_KEY: ${{ vars.ALGOLIA_SEARCH_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: output
        id: output
        run: |
          echo "URL=https://${{ github.repository_owner }}.github.io" >> $GITHUB_OUTPUT
          echo "BASE_PATH=/${GITHUB_REPOSITORY#*/}/" >> $GITHUB_OUTPUT

      - name: prepare env
        run: |
          touch .env
          echo URL=${{ steps.output.outputs.URL }} > .env
          echo BASE_PATH=/ >> .env
          echo ORG=${{ github.repository_owner }} >> .env
          echo ALGOLIA_INDEX_NAME=dev_RF_DOCS >> .env
          echo FASTER=true >> .env

      - name: Install dependencies & build
        run: |
          npm ci
          npm run build
          cp CNAME ./build/

      # Popular action to deploy to GitHub Pages:
      # Docs: https://github.com/peaceiris/actions-gh-pages#%EF%B8%8F-docusaurus
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Build output to publish to the `gh-pages` branch:
          publish_dir: ./build
          # The following lines assign commit authorship to the official
          # GH-Actions bot for deploys to `gh-pages` branch:
          # https://github.com/actions/checkout/issues/13#issuecomment-724415212
          # The GH actions bot is used by default if you didn't specify the two fields.
          # You can swap them out with your own user credentials.
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
